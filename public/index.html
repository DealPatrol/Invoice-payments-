<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invoice &amp; Payments</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
      <span>InvoicePay</span>
    </div>
    <nav>
      <a href="#" class="nav-link active" data-view="dashboard">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        Dashboard
      </a>
      <a href="#" class="nav-link" data-view="invoices">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        Invoices
      </a>
      <a href="#" class="nav-link" data-view="customers">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        Customers
      </a>
    </nav>
  </aside>

  <!-- Main content -->
  <main class="main">
    <!-- Top bar -->
    <header class="topbar">
      <h1 id="page-title">Dashboard</h1>
      <div id="topbar-actions"></div>
    </header>

    <!-- Views -->
    <div id="view-dashboard" class="view active">
      <div class="stats-grid" id="stats-grid"></div>
      <div class="section">
        <h2>Recent Invoices</h2>
        <div id="recent-invoices-table"></div>
      </div>
    </div>

    <div id="view-invoices" class="view">
      <div id="invoices-table-wrap"></div>
    </div>

    <div id="view-customers" class="view">
      <div id="customers-table-wrap"></div>
    </div>

    <!-- Invoice Detail -->
    <div id="view-invoice-detail" class="view">
      <div id="invoice-detail-wrap"></div>
    </div>

    <!-- Invoice Form -->
    <div id="view-invoice-form" class="view">
      <div class="card form-card">
        <h2 id="invoice-form-title">New Invoice</h2>
        <form id="invoice-form">
          <div class="form-grid">
            <div class="form-group">
              <label>Customer *</label>
              <select id="inv-customer" required></select>
            </div>
            <div class="form-group">
              <label>Issue Date *</label>
              <input type="date" id="inv-issue-date" required />
            </div>
            <div class="form-group">
              <label>Due Date *</label>
              <input type="date" id="inv-due-date" required />
            </div>
            <div class="form-group full-width">
              <label>Notes</label>
              <textarea id="inv-notes" rows="2" placeholder="Optional notes or terms…"></textarea>
            </div>
          </div>

          <div class="section items-section">
            <h3>Line Items</h3>
            <div id="line-items-list"></div>
            <button type="button" class="btn btn-secondary btn-sm" id="add-item-btn">+ Add Item</button>
          </div>

          <div class="invoice-totals">
            <div class="total-row"><span>Subtotal</span><span id="inv-subtotal">$0.00</span></div>
            <div class="total-row grand"><span>Total</span><span id="inv-total">$0.00</span></div>
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-secondary" id="invoice-form-cancel">Cancel</button>
            <button type="submit" class="btn btn-primary" id="invoice-form-submit">Create Invoice</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Customer Form -->
    <div id="view-customer-form" class="view">
      <div class="card form-card">
        <h2 id="customer-form-title">New Customer</h2>
        <form id="customer-form">
          <div class="form-grid">
            <div class="form-group">
              <label>Name *</label>
              <input type="text" id="cust-name" required placeholder="Full name or company" />
            </div>
            <div class="form-group">
              <label>Email *</label>
              <input type="email" id="cust-email" required placeholder="billing@example.com" />
            </div>
            <div class="form-group">
              <label>Phone</label>
              <input type="tel" id="cust-phone" placeholder="+1 555 000 0000" />
            </div>
            <div class="form-group full-width">
              <label>Address</label>
              <textarea id="cust-address" rows="2" placeholder="Street, City, Country"></textarea>
            </div>
          </div>
          <div class="form-actions">
            <button type="button" class="btn btn-secondary" id="customer-form-cancel">Cancel</button>
            <button type="submit" class="btn btn-primary" id="customer-form-submit">Save Customer</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Payment Form (modal) -->
    <div id="payment-modal" class="modal-overlay hidden">
      <div class="modal">
        <h3>Record Payment</h3>
        <form id="payment-form">
          <div class="form-group">
            <label>Amount *</label>
            <input type="number" id="pay-amount" min="0.01" step="0.01" required />
          </div>
          <div class="form-group">
            <label>Payment Date *</label>
            <input type="date" id="pay-date" required />
          </div>
          <div class="form-group">
            <label>Method</label>
            <select id="pay-method">
              <option value="bank_transfer">Bank Transfer</option>
              <option value="cash">Cash</option>
              <option value="credit_card">Credit Card</option>
              <option value="check">Check</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label>Notes</label>
            <input type="text" id="pay-notes" placeholder="Optional reference…" />
          </div>
          <div class="form-actions">
            <button type="button" class="btn btn-secondary" id="pay-cancel">Cancel</button>
            <button type="submit" class="btn btn-primary">Record Payment</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Toast notification -->
    <div id="toast" class="toast hidden"></div>
  </main>

  <script src="/js/app.js"></script>
</body>
</html>
